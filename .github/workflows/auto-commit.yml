name: 🌱 Keep Graph Green

on:
  schedule:
    # 14 time slots (UTC) — matching config.json time_pool
    # IST equivalents shown in comments
    - cron: "53 3 * * *"    # 09:23 AM IST
    - cron: "17 5 * * *"    # 10:47 AM IST
    - cron: "8 6 * * *"     # 11:38 AM IST
    - cron: "42 7 * * *"    # 01:12 PM IST
    - cron: "14 9 * * *"    # 02:44 PM IST
    - cron: "37 10 * * *"   # 04:07 PM IST
    - cron: "3 12 * * *"    # 05:33 PM IST
    - cron: "21 13 * * *"   # 06:51 PM IST
    - cron: "47 14 * * *"   # 08:17 PM IST
    - cron: "12 16 * * *"   # 09:42 PM IST
    - cron: "33 17 * * *"   # 11:03 PM IST
    - cron: "57 18 * * *"   # 12:27 AM IST
    - cron: "44 19 * * *"   # 01:14 AM IST
    - cron: "21 20 * * *"   # 01:51 AM IST
  workflow_dispatch: # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run commit script
        run: python commit.py
